<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">DJ's House of Cards & Comics comics placeholder</title>
<desc id="desc">Bold comic-inspired placeholder art with speech bubbles and halftone dots.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1f2fa3"/>
    <stop offset="100%" stop-color="#ef1823"/>
  </linearGradient>
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="4" cy="4" r="3" fill="rgba(255,255,255,0.18)"/>
  </pattern>
</defs>
<rect width="1200" height="800" fill="url(#bg)"/>
<rect width="1200" height="800" fill="url(#dots)"/>
<g fill="#ffffff">
  <path d="M120 170h960v130H120z" opacity=".92"/>
  <path d="M120 350h700l110 105v110H120z" opacity=".94"/>
  <path d="M890 335h180l50 90-120 25z" opacity=".94"/>
</g>
<text x="600" y="255" text-anchor="middle" font-family="Bebas Neue, Arial Black, sans-serif" font-size="122" fill="#ef1823" letter-spacing="4">COMICS</text>
<text x="495" y="440" text-anchor="middle" font-family="Bebas Neue, Arial Black, sans-serif" font-size="84" fill="#1f2fa3" letter-spacing="3">DJ'S HOUSE OF CARDS</text>
<text x="502" y="525" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" fill="#172033">Classic covers • Keys • Bronze Age • Bronze-age favorites</text>
<text x="980" y="395" text-anchor="middle" font-family="Bebas Neue, Arial Black, sans-serif" font-size="46" fill="#1f2fa3" transform="rotate(-13 980 395)">POW!</text>
</svg>